<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Günseli Tümer-Alkan</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #1f4b99;
      --accent-soft: #eef4ff;
      --max: 1050px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      color: #111827;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    h3 {
      font-size: 1.2rem;
      margin-top: 30px;
    }

    p {
      line-height: 1.8;
      font-size: 1.02rem;
      color: #374151;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 600;
    }

    .nav button {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
  </style>
</head>
